<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tournament Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <h1 id="main-title">🏆 Tournament Generator</h1>
        
        <div id="game-card" class="card active-screen">
            <h2>Kies je Game</h2>
            <p class="subtitle">Selecteer de game voor dit toernooi</p>
            <div class="game-options">
                <button class="game-btn" onclick="kiesGame('Polytopia')">👑 Polytopia</button>
                <button class="game-btn" onclick="kiesGame('Rollo Rush')">🦔 Rollo Rush</button>
                <button class="game-btn" onclick="kiesGame('Snooker')">🎱 Snooker</button>
                <button class="game-btn" onclick="kiesGame('Normale Bracket')">⚔️ Normaal</button>
            </div>
        </div>
        
        <div id="setup-card" class="card hidden-screen">
            <div class="card-header">
                <h2>Spelers</h2>
                <button class="back-btn" onclick="terugNaarMenu()">⬅ Menu</button>
            </div>
            
            <p class="subtitle">Klik op vrienden om toe te voegen:</p>
            <div class="button-grid" id="vrienden-grid">
                <button onclick="addVasteSpeler(this, 'Lennart')">Lennart</button>
                <button onclick="addVasteSpeler(this, 'Paul-David')">Paul-David</button>
                <button onclick="addVasteSpeler(this, 'Daniël')">Daniël</button>
                <button onclick="addVasteSpeler(this, 'Nino')">Nino</button>
                <button onclick="addVasteSpeler(this, 'Renzo')">Renzo</button>
                <button onclick="addVasteSpeler(this, 'Remi')">Remi</button>
                <button onclick="addVasteSpeler(this, 'Jawad')">Jawad</button>
            </div>

            <p class="subtitle">Andere spelers (komma gescheiden):</p>
            <textarea id="player-input" placeholder="Bijv: Jan, Sara..."></textarea>
            
            <button class="action-btn" onclick="startTournament()">Start Toernooi</button>
        </div>

        <div id="bracket-card" class="card hidden-screen">
            <div class="bracket-header">
                <h2 id="bracket-title">Toernooi Schema</h2>
                <button class="reset-btn" onclick="resetTournament()">Nieuw</button>
            </div>
            <div id="rounds-container" class="rounds-container"></div>
        </div>
    </div>

    <div id="winner-overlay" class="overlay hidden">
        <div class="winner-card">
            <div class="confetti">🎉🥳🎉🥳🎉</div>
            <h2>WINNAAR!</h2>
            <div class="champion-badge">
                <span class="big-crown">👑</span>
                <h1 id="champion-name">NAAM</h1>
            </div>
            <button class="celebrate-btn" onclick="sluitWinnaarPopup()">Bekijk Bracket</button>
            <button class="restart-btn" onclick="resetTournament()">Nieuw Toernooi</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
